# Pipeline de Integração Contínua (CI) da Forum API.
# A cada push ou pull request, o GitHub executa automaticamente o lint
# e os testes unitários, garantindo que código quebrado não entre na branch.

name: CI

# Gatilhos: o pipeline roda em todo push e em todo pull request.
on:
  push:
  pull_request:

jobs:
  build-and-test:
    # Ambiente de execução: máquina virtual Ubuntu mais recente.
    runs-on: ubuntu-latest

    steps:
      # 1) Baixa o código do repositório para dentro da máquina do CI.
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2) Instala e configura o interpretador Python na versão 3.12.
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3) Instala as dependências do projeto a partir do requirements.txt.
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4) Etapa adicional além dos testes: análise estática com ruff.
      #    Detecta erros de estilo e possíveis bugs antes de rodar os testes,
      #    falhando o pipeline cedo caso haja problema de qualidade no código.
      - name: Lint (ruff)
        run: ruff check api/

      # 5) Executa a suite de testes unitários com pytest.
      #    Se qualquer teste falhar, o job inteiro fica vermelho e o push
      #    é sinalizado como quebrado.
      - name: Rodar testes
        run: python -m pytest -v
